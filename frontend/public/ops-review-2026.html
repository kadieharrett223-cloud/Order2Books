<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order2Books Walkthrough</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0b1220;
        color: #e2e8f0;
      }
      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(1100px, 96vw);
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 14px;
        padding: 18px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 18px;
        font-weight: 600;
      }
      video {
        width: 100%;
        border-radius: 10px;
        background: #000;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="card">
        <h1>Order2Books Product Walkthrough</h1>
        <video controls preload="metadata" playsinline>
          <source src="/merchant-walkthrough-video.mp4" type="video/mp4" />
          Your browser does not support the video tag.
        </video>
      </section>
    </div>
  </body>
</html>
